services:
  - type: web
    name: fibrosense-api
    runtime: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.12"
